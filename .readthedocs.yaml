# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  # 3.12, not 3.13: pygenogrove ships cp39–cp312 wheels only. On 3.13 pip falls
  # back to the sdist and compiles from source (needs htslib), which fails here.
  tools:
    python: "3.12"
  apt_packages:
    - doxygen
  jobs:
    pre_build:
      - mkdir -p repos
      - git clone --depth 1 https://github.com/genogrove/genogrove.git repos/genogrove
      - doxygen Doxyfile
      - ls -R doxygen/xml

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: source/conf.py

python:
  install:
    - requirements: source/requirements.txt

    # Optionally, but recommended,
    # declare the Python requirements required to build your documentation
    # See https://docs.readthedocs.io/en/stable/guides/reproducible-builds.html
    # python:
    #    install:
    #    - requirements: docs/requirements.txt
